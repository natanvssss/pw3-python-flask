<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Consoles</title>
</head>
<body>
    <h1>Bem-vindo a página de consoles</h1>
    <h3>Consoles</h3>
    <hr>
    <h2>Console em Destaque:</h2>
    {% for chave, valor in console.items() %}
    <details>
        <summary>{{ chave }}</summary>
        <p>{{valor}}</p>
    </details>


    {% endfor %}
  

</body>
</html>
