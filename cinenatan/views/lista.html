<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Filmes</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
            color: #ffcc00;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        table {
            margin: 40px auto;
            border-collapse: collapse;
            width: 80%;
            max-width: 800px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        th, td {
            padding: 15px;
            border: 1px solid #ffcc00;
        }

        th {
            background-color: #ffcc00;
            color: black;
            font-size: 18px;
        }

        tr:hover {
            background-color: rgba(255, 204, 0, 0.2);
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <h1>🎬 Lista de Filmes</h1>

    <table>
        <tr>
            <th>Filme</th>
            <th>Tipo</th>
            <th>Duração</th>
        </tr>

        <tr>
            <td>Star Wars</td>
            <td>Ficção Científica / Aventura</td>
            <td>2h 1min</td>
        </tr>

        <tr>
            <td>Senhor dos Anéis</td>
            <td>Fantasia / Aventura</td>
            <td>2h 58min</td>
        </tr>

        <tr>
            <td>Harry Potter</td>
            <td>Fantasia / Aventura</td>
            <td>2h 32min</td>
        </tr>

    </table>

</body>
</html>
