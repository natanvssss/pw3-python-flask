<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Games</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-top: 80px;
            color: #ffcc00;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 30px;
            color: #dddddd;
        }

        hr {
            width: 60%;
            border: 1px solid #ffcc00;
            margin: 20px auto;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 40px;
            margin: 40px auto;
            width: 80%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            margin-top: 20px;
            background-color: #ffcc00;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ffaa00;
            transform: scale(1.05);
        }


    </style>
</head>
<body>
    

    <div class="container">
        <h1>Bem vindo ao Cinenatan!!</h1>
        <h3>Seu site para filmes!!</h3>
        <hr>
        <a href="#" class="btn">Explorar Filmes</a>
    </div>
       <a href="/lista">lista</a>
       <a href="/formulario">fomulario</a>


   
</body>
</html>
